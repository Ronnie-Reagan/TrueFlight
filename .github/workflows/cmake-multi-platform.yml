name: Build and Release TrueFlight Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'V*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 45
    env:
      BUILD_DIR: build/ci/windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Show tool versions
        shell: pwsh
        run: |
          python --version
          cmake --version
          Get-Command glslangValidator | Format-List Source, Version

      - name: Build TrueFlight
        shell: pwsh
        run: |
          python NativePort/build_trueflight.py `
            --generator "Visual Studio 17 2022" `
            --arch x64 `
            --config Release `
            --target TrueFlight `
            --build-dir $env:BUILD_DIR

      - name: Stage package
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev-${{ github.run_number }}" }
          $packageName = "TrueFlight-windows-x64-$version"

          $stageDir = Join-Path $env:GITHUB_WORKSPACE "dist/$packageName"
          $assetDir = Join-Path $stageDir "portSource/Assets"

          if (Test-Path $stageDir) {
            Remove-Item $stageDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          Copy-Item "$env:BUILD_DIR/NativePort/Release/*" -Destination $stageDir -Recurse -Force
          Copy-Item "portSource/Assets/*" -Destination $assetDir -Recurse -Force
          Copy-Item "LICENSE.txt" -Destination $stageDir -Force

      - name: Create zip package
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev-${{ github.run_number }}" }
          $packageName = "TrueFlight-windows-x64-$version"
          $packageDir = Join-Path $env:GITHUB_WORKSPACE "dist/$packageName"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "dist/$packageName.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$packageDir/*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueFlight-windows-x64-${{ github.run_number }}
          if-no-files-found: error
          path: dist/*.zip

      - name: Determine release type
        if: github.ref_type == 'tag'
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          if ($tag -match '^V0\.') {
            "prerelease=true" >> $env:GITHUB_OUTPUT
            "release_name=TrueFlight Pre-Release $tag" >> $env:GITHUB_OUTPUT
          }
          else {
            "prerelease=false" >> $env:GITHUB_OUTPUT
            "release_name=TrueFlight $tag" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.release_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generate_release_notes: true
          files: dist/TrueFlight-windows-x64-${{ github.ref_name }}.zip
