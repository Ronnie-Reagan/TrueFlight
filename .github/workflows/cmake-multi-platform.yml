name: Build TrueFlight Windows EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 45
    env:
      BUILD_DIR: build/ci/windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Show tool versions
        shell: pwsh
        run: |
          python --version
          cmake --version
          Get-Command glslangValidator | Format-List Source, Version

      - name: Build TrueFlight
        shell: pwsh
        run: |
          python NativePort/build_trueflight.py `
            --generator "Visual Studio 17 2022" `
            --arch x64 `
            --config Release `
            --target TrueFlight `
            --build-dir $env:BUILD_DIR

      - name: Stage package
        shell: pwsh
        run: |
          $stageDir = Join-Path $env:GITHUB_WORKSPACE "dist/TrueFlight-windows-x64"
          $assetDir = Join-Path $stageDir "portSource/Assets"

          if (Test-Path $stageDir) {
            Remove-Item $stageDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          Copy-Item "$env:BUILD_DIR/NativePort/Release/*" -Destination $stageDir -Recurse -Force
          Copy-Item "portSource/Assets/*" -Destination $assetDir -Recurse -Force
          Copy-Item "LICENSE.txt" -Destination $stageDir -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueFlight-windows-x64
          if-no-files-found: error
          path: dist/TrueFlight-windows-x64
